name: 自动刷步任务

on:
  schedule:
    # 这里的 cron 是 UTC 时间。 0 0 * * * 代表 UTC 0点，也就是北京时间早上 8 点运行
    - cron: '0 10 * * *'
  workflow_dispatch: # 允许你在网页上手动点击运行测试16

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行刷步脚本
        env:
          APP_TOKEN: ${{ secrets.APP_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python githubRunPhone_updated.py
